<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KULE RADAR — Komuta Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              rajdhani: ['Rajdhani', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            },
            colors: {
              'slate-950': '#020617',
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #020617; /* slate-950 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* Progress Bar Animation (Yavaş ve GPU dostu) */
        @keyframes slowStripe { 0% { transform: translateX(0); } 100% { transform: translateX(28.3px); } }
        .prog-stripes {
            background: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255,255,255,0.15) 10px, rgba(255,255,255,0.15) 20px);
            animation: slowStripe 4s linear infinite;
        }

        /* Slide Transitions (Süre kısaltıldı) */
        .slide {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .slide.active { opacity: 1; pointer-events: auto; }

        /* General Glow Util (Performans: Box-shadow yerine ince border kullanıldı) */
        .glow-green { border: 1px solid rgba(0,255,136,0.3); }
        .glow-cyan { border: 1px solid rgba(0,255,255,0.3); }
        .glow-orange { border: 1px solid rgba(255,165,0,0.3); }
        
        /* Performans: CPU yormayan yavaş opacity animasyonları (gözü de yormaz) */
        @keyframes gentlePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-warn { border: 1px solid rgba(255,165,0,0.8); animation: gentlePulse 4s ease-in-out infinite; }
        .pulse-crit { border: 1px solid rgba(255,34,68,0.8); animation: gentlePulse 2s ease-in-out infinite; }
        .pulse-live { animation: gentlePulse 3s ease-in-out infinite; }

        /* Nav Dot Active */
        .nav-dot { transition: all 0.3s; }
        .nav-dot.on { background-color: #00ffff; width: 32px; }

        /* Soft LED Clock Glow */
        .soft-led-glow {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(34, 211, 238, 0.8), 
                         0 0 15px rgba(34, 211, 238, 0.5), 
                         0 0 30px rgba(34, 211, 238, 0.3);
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* Anti-Shifting Fixed Digits for Orbitron */
        .digit { display: inline-block; width: 0.85em; text-align: center; }
        .colon { display: inline-block; width: 0.4em; text-align: center; }

        /* Radar Analog Clock */
        .radar-clock-wrapper {
            position: relative; width: 100%; max-width: 800px; max-height: 75vh; aspect-ratio: 1; margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.05) 0%, rgba(2, 6, 23, 0.9) 70%);
            border: 2px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.1), inset 0 0 40px rgba(34, 211, 238, 0.1);
        }
        .radar-grid {
            position: absolute; inset: 0; border-radius: 50%;
            background-image: linear-gradient(rgba(34, 211, 238, 0.15) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(34, 211, 238, 0.15) 1px, transparent 1px);
            background-size: 60px 60px; background-position: center; overflow: hidden;
        }
        .radar-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px dashed rgba(34, 211, 238, 0.3); border-radius: 50%;
        }
        .radar-circle.c1 { width: 33%; height: 33%; }
        .radar-circle.c2 { width: 66%; height: 66%; border-style: solid; border-width: 2px; border-color: rgba(34, 211, 238, 0.4); }
        .radar-circle.c3 { width: 95%; height: 95%; }
        .radar-sweep {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(34, 211, 238, 0.05) 270deg, rgba(34, 211, 238, 0.4) 360deg);
            will-change: transform;
        }
        .clock-hand {
            position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center;
            border-radius: 4px; z-index: 10;
            will-change: transform;
        }
        .hand-hour { width: 8px; height: 25%; background: #ffffff; margin-left: -4px; box-shadow: 0 0 12px rgba(255, 255, 255, 1); border-radius: 6px; }
        .hand-minute { width: 6px; height: 38%; background: #22d3ee; margin-left: -3px; box-shadow: 0 0 10px rgba(34, 211, 238, 0.9); border-radius: 4px; }
        .hand-second { width: 2px; height: 48%; background: #f97316; margin-left: -1px; box-shadow: 0 0 10px rgba(249, 115, 22, 0.8); }
        .clock-center {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; margin-top: -10px; margin-left: -10px;
            background: #ffffff; border-radius: 50%; box-shadow: 0 0 15px #ffffff; z-index: 20;
        }
        .radar-mark {
            position: absolute; font-family: 'Orbitron', sans-serif; color: #67e8f9;
            font-size: 3.75rem; font-weight: 900; 
            text-shadow: 2px 2px 4px #000, 0 0 15px rgba(34, 211, 238, 0.9);
            transform: translate(-50%, -50%); z-index: 5;
        }
        .mark-12 { top: 8%; left: 50%; }
        .mark-3 { top: 50%; left: 92%; }
        .mark-6 { top: 92%; left: 50%; }
        .mark-9 { top: 50%; left: 8%; }

        .radar-tick {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%; margin-left: -2px; z-index: 2;
        }
        .radar-tick::before {
            content: ''; position: absolute; top: 2%; left: 0; width: 100%; height: 4%;
            background: rgba(34, 211, 238, 0.7); box-shadow: 0 0 6px rgba(34, 211, 238, 0.6); border-radius: 2px;
        }
        .radar-tick::after {
            content: ''; position: absolute; bottom: 2%; left: 0; width: 100%; height: 4%;
            background: rgba(34, 211, 238, 0.7); box-shadow: 0 0 6px rgba(34, 211, 238, 0.6); border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen lg:h-screen w-full text-white flex flex-col">

    <!-- OVERLAYS (Vignette) - GPU yükü için kaldırıldı -->

    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center w-full px-4 lg:px-10 py-4 lg:py-6 gap-4 lg:gap-0 relative z-[60] shrink-0">
        <!-- Sol Üst: Logo ve İsim -->
        <div class="flex flex-row items-center gap-4 lg:gap-6 bg-slate-900/90 p-2 lg:p-4 rounded-2xl border-none ring-0 outline-none">
            <img src="/static/img/logo.png" alt="Logo" class="w-16 h-16 lg:w-20 lg:h-20 object-contain brightness-110" onerror="this.style.display='none'">
            <div class="flex flex-col">
                <span class="font-orbitron font-black text-2xl lg:text-4xl text-cyan-300 tracking-widest">KULE RADAR</span>
                <span class="font-mono text-xs lg:text-sm text-cyan-100/70 tracking-widest uppercase font-bold mt-0.5">DEEP TECH ORCHESTRA</span>
            </div>
        </div>
        
        <!-- Sağ Üst: Saat ve Tarih -->
        <div class="flex flex-col items-start lg:items-end gap-2 lg:gap-3 relative">
            <div id="langBadge" class="absolute -top-4 right-0 lg:-right-4 font-orbitron font-bold text-xs bg-orange-600/20 text-orange-400 border border-orange-500/50 px-2 py-0.5 rounded opacity-0 transition-opacity duration-500">LANG: EN</div>
            <div id="clock" class="tabular-nums soft-led-glow font-orbitron text-5xl lg:text-7xl min-w-[160px] lg:min-w-[340px] text-left lg:text-right">00:00:00</div>
            <div class="flex flex-row items-center gap-4 lg:gap-6 mt-1 lg:mt-2">
                <!-- Tarih Badge -->
                <div id="cDate" class="font-mono text-lg lg:text-2xl font-bold bg-cyan-900/30 text-cyan-300 px-4 lg:px-6 py-1.5 tracking-widest rounded uppercase border-none ring-0 outline-none">
                    -- ---- ---- // ---------
                </div>
                <!-- Canlı Indicator (Yavaş ve hafif animasyon) -->
                <div class="flex items-center gap-2 lg:gap-3 text-slate-100 font-mono text-lg lg:text-2xl font-bold">
                    <div class="w-3 h-3 lg:w-4 lg:h-4 rounded-full bg-green-500 pulse-live"></div>
                    <span id="liveText">CANLI</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row w-full flex-1 relative z-10 px-4 lg:px-6 pb-6 gap-6 lg:overflow-hidden">
        
        <!-- LEFT PANEL: PROJECT STAGE -->
        <main class="flex-1 flex flex-col relative bg-slate-900/80 border border-slate-800 p-6 lg:p-12 overflow-hidden min-h-[500px] lg:min-h-0 h-full rounded-2xl">

            <div id="stage" class="relative w-full h-full">
                <!-- Data inject -->
                <div id="noData" class="absolute inset-0 flex items-center justify-center font-orbitron text-lg lg:text-2xl text-slate-400 tracking-widest hidden">
                    [ VERİ BEKLENİYOR ]
                </div>
            </div>
            
            <div id="nav" class="absolute bottom-6 lg:bottom-12 left-6 lg:left-12 flex gap-4 z-20 items-center flex-wrap max-w-full pr-6">
                <!-- Nav Dots inject -->
            </div>
        </main>

        <!-- RIGHT PANEL: HEROES -->
        <aside class="w-full lg:w-[540px] h-auto lg:h-full bg-slate-900/80 border border-slate-800 flex flex-col pt-8 lg:pt-12 pb-8 px-4 lg:px-8 rounded-2xl shrink-0 lg:overflow-hidden">
            <h2 class="flex flex-col text-center mb-8 lg:mb-12">
                <span id="heroTitle" class="font-orbitron text-2xl lg:text-4xl font-bold text-cyan-400 tracking-widest uppercase">Mutfak Kahramanları</span>
                <span id="heroSubtitle" class="font-mono text-slate-100 mt-2 lg:mt-3 text-sm lg:text-xl uppercase tracking-widest">Bu Ayın Operasyon Yıldızları</span>
            </h2>
            
            <div id="heroesList" class="flex flex-col gap-6 lg:gap-10 flex-1 overflow-y-auto pr-2 pb-6">
                <!-- Heroes inject -->
            </div>
            
            <div id="footerInfo" class="mt-8 font-mono text-center text-xs lg:text-sm text-slate-300 uppercase tracking-widest">
                SYS :: BOOT
            </div>
        </aside>

    </div>

    <script>
    (function KuleRadar() {
        "use strict";

        const i18n = {
            tr: { countdown: "GERİ SAYIM", daysLeft: "GÜN KALDI", progress: "PROJE İLERLEMESİ", heroes: "MUTFAK KAHRAMANLARI", subtitle: "Bu Ayın Operasyon Yıldızları", live: "CANLI", active: "● AKTİF", risk: "▲ RİSKTE", expired: "SÜRE DOLDU", unknown: "Bilinmiyor", noData: "[ VERİ BEKLENİYOR ]", radar: "RADAR ÖZETİ", fieldOpsTitle: "⚡ SAHA KURULUMU DEVAM EDİYOR", fieldOpsMsg: "Sahadaki ekibimize operasyonda başarılar dileriz.", successTitle: "🎯 OPERASYON BAŞARIYLA TAMAMLANDI!", successMsg: "Bu büyük başarıda emeği geçen tüm ekibimizi tebrik ederiz.", timeSyncTitle: "SİSTEM ZAMAN SENKRONİZASYONU" },
            en: { countdown: "COUNTDOWN", daysLeft: "DAYS LEFT", progress: "PROJECT PROGRESS", heroes: "KITCHEN HEROES", subtitle: "Operation Stars of the Month", live: "LIVE", active: "● ACTIVE", risk: "▲ AT RISK", expired: "TIME UP", unknown: "Unknown", noData: "[ WAITING FOR DATA ]", radar: "RADAR SUMMARY", fieldOpsTitle: "⚡ FIELD INSTALLATION IN PROGRESS", fieldOpsMsg: "We wish our field team success in the operation.", successTitle: "🎯 OPERATION COMPLETED SUCCESSFULLY!", successMsg: "Congratulations to our entire team for this great achievement.", timeSyncTitle: "SYSTEM TIME SYNCHRONIZATION" }
        };
        let currentLang = 'tr';

        const API = "/api/data", POLL = 30000, SL_MS = 15000;
        let data = null, idx = 0, max = 0, tmr = null;

        const $stage  = document.getElementById("stage");
        const $nav    = document.getElementById("nav");
        const $heroes = document.getElementById("heroesList");
        const $noData = document.getElementById("noData");
        const $footer = document.getElementById("footerInfo");
        const $clock  = document.getElementById("clock");
        const $cDate  = document.getElementById("cDate");
        const $liveText = document.getElementById("liveText");
        const $langBadge = document.getElementById("langBadge");
        
        const MN_TR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
        const DN_TR = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
        const MN_EN = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        const DN_EN = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];

        function tick() {
            const n = new Date();
            
            // Orbitron fontunun 1 ve 0 gibi rakamlarındaki milimetrik farkları
            // tamamen ezmek için her rakamı sabit genişlikli span içine alıyoruz.
            const makeDigits = (val) => String(val).padStart(2, '0').split('').map(d => `<span class="digit">${d}</span>`).join('');
            
            const h = makeDigits(n.getHours());
            const m = makeDigits(n.getMinutes());
            const s = makeDigits(n.getSeconds());
            const blink = `<span class="colon animate-pulse opacity-80">:</span>`;
            
            $clock.innerHTML = `${h}${blink}${m}${blink}${s}`;
            
            if($cDate) {
                const M = currentLang === "tr" ? MN_TR : MN_EN;
                const D = currentLang === "tr" ? DN_TR : DN_EN;
                $cDate.textContent = `${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()} // ${D[n.getDay()]}`;
            }
        }
        tick(); setInterval(tick, 1000);

        async function poll() {
            try {
                const r = await fetch(API,{cache:"no-store"});
                if (!r.ok) throw new Error(r.status);
                const d = await r.json();
                if (JSON.stringify(d) !== JSON.stringify(data)) { data = d; renderAll(); }
            } catch(e) { console.warn("[KR]",e.message); }
        }
        poll(); setInterval(poll, POLL);

        function renderAll() {
            if (!data) return;
            renderSlides();
            renderHeroes();
            if (data.last_updated) {
                const d = new Date(data.last_updated);
                $footer.textContent = `SYS :: SON GÜNCELLEME :: ${d.toLocaleString("tr-TR")}`;
            }
        }

        /* ── Slides ────────────────── */
        function renderSlides() {
            const ps = data.active_projects || [];
            $stage.querySelectorAll(".slide").forEach(e => e.remove());
            $nav.innerHTML = "";
            max = 0;
            
            if (ps.length === 0) {
                $noData.classList.remove("hidden");
                return;
            }
            $noData.classList.add("hidden");

            const langs = ["tr", "en"];
            langs.forEach((lang) => {
                ps.forEach((p) => {
                    const slideEl = document.createElement("div");
                    slideEl.className = `slide flex flex-col gap-6 lg:gap-10 justify-start lg:justify-center w-full h-full pt-8 lg:pt-16 max-h-full overflow-y-auto lg:overflow-visible pr-2`;
                    slideEl.dataset.lang = lang;
                    slideEl.innerHTML = mkSlide(p, lang);
                    $stage.appendChild(slideEl);
                    
                    const dot = document.createElement("div");
                    dot.className = `nav-dot h-3 w-3 bg-slate-600 rounded-full`;
                    $nav.appendChild(dot);
                    max++;
                });

                // Clock Sync Slide
                const clockSlide = document.createElement("div");
                clockSlide.className = "slide flex flex-col justify-start lg:justify-center w-full h-full pt-4 lg:pt-8 pr-2";
                clockSlide.dataset.lang = lang;
                clockSlide.dataset.duration = "30000";
                clockSlide.innerHTML = mkClockInner(lang);
                $stage.appendChild(clockSlide);

                const cDot = document.createElement("div");
                cDot.className = "nav-dot h-3 w-3 bg-orange-600 rounded-full mb-1 border border-orange-800";
                $nav.appendChild(cDot);
                max++;

                // Radar slide for summary
                const radarSlide = document.createElement("div");
                radarSlide.className = "slide flex flex-col justify-start lg:justify-center w-full h-full pt-4 lg:pt-8 pr-2";
                radarSlide.dataset.lang = lang;
                radarSlide.innerHTML = mkRadarInner(ps, lang);
                $stage.appendChild(radarSlide);

                const rDot = document.createElement("div");
                rDot.className = "nav-dot h-3 w-3 bg-cyan-600 rounded-full mb-1 border border-cyan-800";
                $nav.appendChild(rDot);
                max++;
            });

            idx = 0; go(0); resetTmr();
        }

        function mkSlide(p, lang) {
            const t = i18n[lang];
            const pct = p.progress || 0;
            const risk = p.status === "at_risk";
            const isComp = p.is_completed || false;
            
            let displayPct = isComp ? 100 : pct;
            let barBg = "bg-cyan-500 glow-cyan";
            let pctText = "text-cyan-400";
            
            if (isComp || pct >= 70) { barBg = "bg-green-500 glow-green"; pctText = "text-green-400"; }
            if (risk && !isComp) { barBg = "bg-orange-500 glow-orange"; pctText = "text-orange-400"; }
            
            const days = calcDays(p.deadline);
            let timeCls = "text-green-400 text-3xl md:text-5xl lg:text-6xl";
            let timeText = `${days} ${t.daysLeft}`;
            if (days <= 14 && days > 0) timeCls = "text-orange-500 text-3xl md:text-5xl lg:text-6xl pulse-warn";
            if (days <= 0) { timeCls = "text-red-500 text-2xl md:text-4xl lg:text-5xl pulse-crit"; timeText = t.expired; }
            
            const teamHtml = (p.team || p.team_ids || []).map(m => {
                const avatar = m.avatar_url || m.photo_url || "/static/avatars/default1.svg";
                const mName = (m.name && typeof m.name === 'object') ? (m.name[lang] || m.name.tr || "İsimsiz") : (m.name || "İsimsiz");
                const mRole = (m.role && typeof m.role === 'object') ? (m.role[lang] || m.role.tr || t.unknown) : (m.role || t.unknown);
                return `
                <div class="flex items-start gap-3 lg:gap-4 bg-slate-800/80 rounded-2xl p-3 lg:p-4 w-full sm:w-[280px] lg:w-[340px] shrink-0 border border-slate-700">
                    <img src="${esc(avatar)}" class="w-14 h-14 lg:w-20 lg:h-20 rounded-full object-cover shrink-0 mt-1">
                    <div class="flex flex-col flex-1 min-w-0">
                        <span class="text-lg lg:text-2xl font-bold text-white mb-1 leading-tight break-words whitespace-normal">${esc(mName)}</span>
                        <span class="text-xs lg:text-lg text-slate-100 font-mono leading-tight break-words whitespace-normal">${esc(mRole)}</span>
                    </div>
                </div>
            `}).join("");

            const pName = (p.name && typeof p.name === 'object') ? (p.name[lang] || p.name.tr || t.unknown) : (p.name || t.unknown);

            return `
                <!-- 1. Satır: Proje ID ve Statü -->
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 lg:gap-6 shrink-0">
                    <div class="font-orbitron font-bold text-2xl lg:text-4xl text-white bg-cyan-900/60 px-4 py-2 lg:px-6 lg:py-3 tracking-widest rounded-lg">${esc(p.id)}</div>
                    <div class="font-mono font-bold text-xl lg:text-3xl uppercase tracking-widest px-4 py-2 lg:px-6 lg:py-3 rounded-lg text-white ${risk ? 'bg-orange-600/80' : 'bg-green-600/80'}">
                        ${risk ? t.risk : t.active}
                    </div>
                </div>
                
                <!-- 2. Satır: Proje Başlığı -->
                <h1 class="font-orbitron text-4xl md:text-5xl lg:text-7xl font-black text-white uppercase tracking-wider leading-tight shrink-0">
                    ${esc(pName)}
                </h1>
                
                <!-- 3. Satır: Progress Bar -->
                ${!p.is_in_installation ? `
                <div class="w-full flex flex-col gap-3 lg:gap-5 mt-2 lg:mt-4 shrink-0">
                    <div class="flex justify-between items-end w-full">
                        <span class="font-mono text-xl md:text-2xl lg:text-3xl text-slate-100 tracking-widest">${t.progress}</span>
                        <span class="font-orbitron text-4xl md:text-5xl lg:text-7xl font-black ${pctText}">%${displayPct}</span>
                    </div>
                    <div class="w-full h-8 lg:h-12 bg-slate-900 rounded-full relative overflow-hidden border border-slate-700">
                        <div class="h-full ${barBg} relative transition-all duration-1000 ease-out" style="width: ${displayPct}%">
                            <div class="absolute inset-0 prog-stripes"></div>
                        </div>
                    </div>
                </div>
                ` : ''}
                
                <!-- 4. Satır: Geri Sayım & Avatarlar -->
                <div class="flex flex-col xl:flex-row gap-4 lg:gap-6 items-start mt-2 lg:mt-4 w-full flex-1 min-h-0 pb-2">
                    <!-- Geri Sayım & Saha Kurulumu & Tamamlandı -->
                    <div class="flex flex-col gap-4 w-full xl:w-1/3 xl:min-w-[360px] shrink-0">
                        ${isComp ? `
                        <!-- Kutlama Paneli -->
                        <div class="bg-green-900/30 border-2 border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.3)] p-8 lg:p-12 rounded-2xl flex flex-col items-center justify-center w-full flex-1 min-h-[220px] relative overflow-hidden">
                            <div class="absolute inset-0 bg-green-500/10 pulse-live"></div>
                            <span class="relative z-10 font-orbitron font-bold text-2xl lg:text-4xl text-green-400 mb-4 text-center uppercase tracking-wider drop-shadow-md">${t.successTitle}</span>
                            <span class="relative z-10 font-mono text-lg lg:text-2xl text-slate-100 text-center font-bold drop-shadow-sm">${t.successMsg}</span>
                        </div>
                        ` : (p.is_in_installation ? `
                        <!-- Saha Kurulumu Modülü -->
                        <div class="bg-orange-900/30 border border-orange-500 p-8 lg:p-12 rounded-2xl flex flex-col items-center justify-center w-full flex-1 min-h-[220px]">
                            <span class="font-orbitron font-bold text-2xl lg:text-4xl text-orange-400 mb-3 text-center uppercase tracking-wider">${t.fieldOpsTitle}</span>
                            <span class="font-mono text-base lg:text-xl text-slate-200 text-center mb-8">${t.fieldOpsMsg}</span>
                            <div class="flex flex-row flex-wrap justify-center gap-6 lg:gap-10">
                                ${ (p.installation_team || []).map(m => `
                                    <div class="flex flex-col items-center gap-3 lg:gap-4">
                                        <img src="${esc(m.avatar_url || "/static/avatars/default1.svg")}" class="w-20 h-20 lg:w-32 lg:h-32 rounded-full border-[3px] border-orange-400 object-cover">
                                        <span class="font-mono text-base lg:text-xl text-orange-200 text-center break-words max-w-[140px]">${esc(m.name)}</span>
                                    </div>
                                `).join("") }
                            </div>
                        </div>
                        ` : `
                        <!-- Geri Sayım -->
                        <div class="bg-slate-800/80 border border-slate-700 p-4 lg:p-6 rounded-2xl flex flex-col items-center justify-center">
                            <span class="font-mono text-base lg:text-xl text-slate-100 uppercase tracking-widest mb-2">${t.countdown}</span>
                            <div class="font-orbitron font-black uppercase ${timeCls} text-center">
                                ${timeText}
                            </div>
                        </div>
                        `)}
                    </div>

                    <!-- Personeller -->
                    <div class="flex flex-row flex-wrap gap-3 lg:gap-4 items-start flex-1 w-full overflow-y-auto pr-2">
                        ${teamHtml}
                    </div>
                </div>
            `;
        }

        function mkRadarInner(ps, lang) {
            const t = i18n[lang];
            
            const gridHtml = ps.map(p => {
                const isInst = p.is_in_installation || false;
                const risk = p.status === "at_risk";
                
                let borderCls, bgCls, titleCls, pctCls;
                
                if (isInst) {
                    borderCls = "border-orange-500";
                    bgCls = "bg-orange-900/30";
                    titleCls = "text-orange-400";
                    pctCls = "text-orange-400";
                } else {
                    borderCls = risk ? "border-red-500" : "border-slate-600";
                    bgCls = risk ? "bg-red-900/30" : "bg-slate-800/80";
                    titleCls = risk ? "text-red-400" : "text-cyan-400";
                    pctCls = risk ? "text-red-400" : (p.progress >= 70 ? "text-green-400" : "text-cyan-400");
                }
                
                let pNameText = "";
                if(typeof p.name === 'object' && p.name !== null) pNameText = p.name[lang] || p.name.tr || "";
                else pNameText = p.name || "";

                return `
                <div class="flex flex-col p-3 sm:p-4 rounded-xl border-2 ${borderCls} ${bgCls}">
                    <div class="flex justify-between items-center mb-1 sm:mb-2 gap-4">
                        <span class="font-orbitron text-base sm:text-lg font-bold text-slate-200 shrink-0">${esc(p.id)}</span>
                        <span class="font-orbitron text-xl sm:text-2xl font-bold ${pctCls}">${isInst ? '' : `%${p.progress||0}`}</span>
                    </div>
                    <div class="font-rajdhani text-xl sm:text-2xl md:text-3xl font-bold ${titleCls} truncate text-ellipsis overflow-hidden whitespace-nowrap">${esc(pNameText)}</div>
                    ${isInst ? `<div class="font-mono text-xs sm:text-sm font-bold text-orange-300 mt-1 sm:mt-2 truncate">${t.fieldOpsTitle}</div>` : ''}
                </div>
                `;
            }).join("");

            return `
                <h1 class="font-orbitron text-4xl sm:text-5xl md:text-6xl font-black text-center text-white uppercase tracking-widest mb-6 md:mb-12 shrink-0">
                    ${t.radar}
                </h1>
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6 content-start w-full flex-1 overflow-y-auto pb-16 pr-2">
                    ${gridHtml}
                </div>
            `;
        }

        function mkClockInner(lang) {
            return `
                <div class="flex-1 flex flex-col items-center justify-center w-full pb-8 gap-10 lg:gap-14">
                    <div class="radar-clock-wrapper">
                        <div class="radar-grid"></div>
                        <div class="radar-circle c1"></div>
                        <div class="radar-circle c2"></div>
                        <div class="radar-circle c3"></div>
                        
                        <div class="radar-tick" style="transform: rotate(30deg);"></div>
                        <div class="radar-tick" style="transform: rotate(60deg);"></div>
                        <div class="radar-tick" style="transform: rotate(120deg);"></div>
                        <div class="radar-tick" style="transform: rotate(150deg);"></div>
                        
                        <div class="radar-sweep clock-anim-sweep"></div>
                        
                        <div class="radar-mark mark-12">12</div>
                        <div class="radar-mark mark-3">03</div>
                        <div class="radar-mark mark-6">06</div>
                        <div class="radar-mark mark-9">09</div>
                        
                        <div class="clock-hand hand-hour clock-anim-h"></div>
                        <div class="clock-hand hand-minute clock-anim-m"></div>
                        <div class="clock-hand hand-second clock-anim-s"></div>
                        
                        <div class="clock-center"></div>
                    </div>
                    
                    <div class="radar-date-text font-mono text-3xl lg:text-5xl font-black bg-cyan-950/50 text-cyan-300 px-6 lg:px-12 py-4 lg:py-6 tracking-[0.1em] rounded-xl uppercase border-2 border-cyan-500 shadow-[0_0_20px_rgba(34,211,238,0.4)]" data-lang="${lang}">
                        -- ---- ---- // ---------
                    </div>
                </div>
            `;
        }

        function animateClock() {
            const now = new Date();
            const ms = now.getMilliseconds();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours() % 12;

            // Milisaniye hassasiyetinde akıcı dönüş (60 FPS) + GPU Hızlandırma
            const sDeg = (s + ms / 1000) * 6;
            const mDeg = (m + s / 60) * 6;
            const hDeg = (h + m / 60) * 30;

            document.querySelectorAll(".clock-anim-sweep").forEach(el => el.style.transform = `translateZ(0) rotate(${sDeg}deg)`);
            document.querySelectorAll(".clock-anim-h").forEach(el => el.style.transform = `translateZ(0) rotate(${hDeg}deg)`);
            document.querySelectorAll(".clock-anim-m").forEach(el => el.style.transform = `translateZ(0) rotate(${mDeg}deg)`);
            document.querySelectorAll(".clock-anim-s").forEach(el => el.style.transform = `translateZ(0) rotate(${sDeg}deg)`);

            document.querySelectorAll(".radar-date-text").forEach(el => {
                const l = el.dataset.lang || 'tr';
                const M = l === "tr" ? MN_TR : MN_EN;
                const D = l === "tr" ? DN_TR : DN_EN;
                el.textContent = `${now.getDate()} ${M[now.getMonth()]} ${now.getFullYear()} // ${D[now.getDay()]}`;
            });

            requestAnimationFrame(animateClock);
        }
        // Saati başlat
        requestAnimationFrame(animateClock);

        function go(i) {
            const ss = $stage.querySelectorAll(".slide");
            const ds = $nav.querySelectorAll(".nav-dot");
            ss.forEach((s,j) => { s.classList.toggle("active", j === i); });
            ds.forEach((d,j) => { d.classList.toggle("on", j === i); });

            const activeSlide = ss[i];
            if(activeSlide) {
                const sl = activeSlide.dataset.lang || 'tr';
                if(currentLang !== sl) {
                    currentLang = sl;
                    updateFixedTexts();
                    renderHeroes(); // Re-render heroes in new language
                }
            }
        }

        function updateFixedTexts() {
            const t = i18n[currentLang];
            document.getElementById("heroTitle").textContent = t.heroes;
            document.getElementById("heroSubtitle").textContent = t.subtitle;
            $liveText.textContent = t.live;
            
            if(currentLang === 'en'){
                $langBadge.classList.remove("opacity-0");
            } else {
                $langBadge.classList.add("opacity-0");
            }
            document.documentElement.lang = currentLang;
            tick();
        }

        function nxt() { 
            if(max<=1) return; 
            idx=(idx+1)%max; 
            go(idx); 
            resetTmr(); 
        }
        function resetTmr() { 
            if(tmr) clearTimeout(tmr); 
            let duration = SL_MS;
            const activeSlide = $stage.querySelectorAll(".slide")[idx];
            if (activeSlide && activeSlide.dataset.duration) {
                duration = parseInt(activeSlide.dataset.duration, 10);
            }
            tmr = setTimeout(nxt, duration); 
        }

        /* ── Heroes ────────────── */
        function renderHeroes() {
            const hs = data.kitchen_heroes || [];
            
            $heroes.innerHTML = hs.map(h => {
                const mName = h.name || "İsimsiz";
                const avatar = h.avatar_url || "/static/avatars/default1.svg";
                const achText = h.achievement && typeof h.achievement === 'object' ? h.achievement[currentLang] || h.achievement.tr : (h.achievement || "");

                return `
                <div class="flex items-center gap-4 lg:gap-8 bg-slate-800/80 border border-slate-700 p-4 lg:p-6 w-full rounded-2xl">
                    <img src="${esc(avatar)}" class="w-16 h-16 lg:w-28 lg:h-28 rounded-full object-cover shrink-0 border-2 border-cyan-500/50">
                    <div class="flex flex-col justify-center flex-1">
                        <div class="font-orbitron text-xl lg:text-3xl font-bold text-cyan-400 mb-1 lg:mb-3 uppercase tracking-wider">${esc(mName)}</div>
                        <div class="text-base lg:text-2xl text-white font-rajdhani leading-snug">${esc(achText)}</div>
                    </div>
                </div>
            `}).join("");
        }

        /* ── Utils ─────────────── */
        function esc(s) { 
            if(!s) return ""; 
            const d=document.createElement("div"); d.textContent=String(s); return d.innerHTML; 
        }
        function calcDays(ds) { 
            if(!ds) return 0; 
            return Math.ceil((new Date(ds+"T23:59:59")-new Date())/864e5); 
        }
    })();
    </script>
</body>
</html>
