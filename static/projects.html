<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KULE RADAR — Operasyon Terminali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              rajdhani: ['Rajdhani', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            },
            colors: {
              'slate-950': '#020617',
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #020617; /* slate-950 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* Çerçevesiz, temiz Hover efekti */
        .prj-card {
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .prj-card:hover {
            background-color: rgba(30, 41, 59, 0.8); /* bg-slate-800/80 */
        }

        /* Yavaş GPU dostu progress bar paterni */
        @keyframes slowStripe { 0% { transform: translateX(0); } 100% { transform: translateX(28.3px); } }
        .prog-stripes {
            background: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255,255,255,0.15) 10px, rgba(255,255,255,0.15) 20px);
            animation: slowStripe 4s linear infinite;
        }

        @keyframes gentlePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-live { animation: gentlePulse 3s ease-in-out infinite; }
        .pulse-warn { animation: gentlePulse 2s ease-in-out infinite; }

        /* Filtre Butonları Özel Neon Stateleri */
        .filter-btn { border: 1px solid transparent; }
        .filter-btn[data-filter="all"].active { background-color: rgba(6, 182, 212, 0.2); color: #67e8f9; border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        .filter-btn[data-filter="field"].active { background-color: rgba(251, 191, 36, 0.2); color: #fcd34d; border-color: rgba(251, 191, 36, 0.5); box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        .filter-btn[data-filter="risk"].active { background-color: rgba(255, 34, 68, 0.2); color: #fb7185; border-color: rgba(255, 34, 68, 0.5); box-shadow: 0 0 10px rgba(255, 34, 68, 0.3); }
        .filter-btn[data-filter="active"].active { background-color: rgba(6, 182, 212, 0.2); color: #67e8f9; border-color: rgba(6, 182, 212, 0.5); box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 255, 0.4); }
    </style>
</head>
<body class="min-h-screen h-screen w-full text-white flex flex-col">

    <!-- ADIM 2: İnatçı Çerçeveleri İNFAZ ET (Tüm border/ring class'ları tamamen 'border-none ring-0 outline-none' yapıldı) -->
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center w-full px-4 lg:px-10 py-4 lg:py-6 gap-4 lg:gap-0 relative z-[60] shrink-0 border-none ring-0 outline-none">
        
        <!-- Sol Üst: Logo ve İsim -->
        <div class="flex flex-row items-center gap-4 lg:gap-6 bg-slate-900/60 p-2 lg:p-4 rounded-2xl border-none ring-0 outline-none">
            <img src="/static/img/logo.png" alt="Logo" class="w-16 h-16 lg:w-20 lg:h-20 object-contain brightness-110" onerror="this.style.display='none'">
            <div class="flex flex-col">
                <span class="font-orbitron font-black text-2xl lg:text-4xl text-cyan-300 tracking-widest">KULE RADAR</span>
                <span id="headerSubtitle" class="font-mono text-xs lg:text-sm text-cyan-100/70 tracking-widest uppercase font-bold mt-0.5">OPERASYON TERMİNALİ</span>
            </div>
        </div>
        
        <!-- Sağ Üst: Saat ve Tarih -->
        <div class="flex flex-col items-start lg:items-end gap-2 lg:gap-3 relative border-none ring-0 outline-none">
            <button id="langToggleBtn" class="absolute -top-4 right-0 lg:-right-4 font-orbitron font-bold text-xs bg-slate-800/80 text-cyan-400 px-2 py-0.5 rounded transition-colors hover:bg-slate-700 cursor-pointer border-none ring-0 outline-none">TR / EN</button>
            <div id="clock" class="font-orbitron text-4xl lg:text-7xl font-bold text-cyan-400">00:00:00</div>
            <div class="flex flex-row items-center gap-4 lg:gap-6 mt-1 lg:mt-2">
                <!-- Tarih Badge -->
                <div id="cDate" class="font-mono text-lg lg:text-2xl font-bold bg-slate-900/60 text-cyan-300 px-4 lg:px-6 py-1.5 tracking-widest rounded-xl uppercase border-none ring-0 outline-none">
                    -- ---- ---- // ---------
                </div>
                <!-- Canlı Indicator -->
                <div class="flex items-center gap-2 lg:gap-3 text-slate-100 font-mono text-lg lg:text-2xl font-bold">
                    <div class="w-3 h-3 lg:w-4 lg:h-4 rounded-full bg-green-500 pulse-live shadow-[0_0_10px_rgba(34,197,94,0.6)]"></div>
                    <span id="liveText">CANLI</span>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENT: List Container -->
    <main class="flex-1 w-full px-4 lg:px-10 pb-8 overflow-hidden flex flex-col min-h-0 relative z-10">
        
        <!-- ADIM 1: Taktiksel Filtreleme ve Arama Çubuğu (Üst Bar) -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6 pb-4 shrink-0 border-b border-slate-800/60 w-full pr-4 lg:pr-8">
            
            <h1 id="pageTitle" class="font-orbitron text-2xl lg:text-3xl font-bold text-white tracking-widest uppercase opacity-90 whitespace-nowrap">TÜM PROJELER</h1>
            
            <!-- Neon Filtre Butonları -->
            <div class="flex flex-wrap items-center justify-center gap-2 lg:gap-3 flex-1 px-4">
                <button data-filter="all" class="filter-btn active font-mono text-xs lg:text-sm px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all cursor-pointer">TÜMÜ</button>
                <button data-filter="field" class="filter-btn font-mono text-xs lg:text-sm px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all cursor-pointer">⚡ SAHA OPRS.</button>
                <button data-filter="risk" class="filter-btn font-mono text-xs lg:text-sm px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all cursor-pointer">🚨 RİSKTE</button>
                <button data-filter="active" class="filter-btn font-mono text-xs lg:text-sm px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all cursor-pointer">🔵 AKTİF</button>
            </div>

            <!-- Arama & Sayaç -->
            <div class="flex items-center gap-3 w-full lg:w-auto shrink-0">
                <input type="text" id="searchInput" placeholder="Proje Ara..." class="w-full lg:w-48 bg-slate-900 text-white font-mono text-sm px-4 py-2 rounded-lg border-none ring-0 outline-none focus:bg-slate-900/90 focus:shadow-[0_0_12px_rgba(0,255,255,0.4)] transition-shadow placeholder-slate-600">
                <div class="font-mono text-slate-400 text-sm bg-slate-900/50 px-3 py-2 rounded-lg shrink-0 border-none ring-0">
                    <span id="totalProjCount" class="font-bold text-cyan-400">0</span> <span id="lblTotal" class="hidden md:inline">Kayıt</span>
                </div>
            </div>

        </div>

        <!-- Proje Grid/Listesi -->
        <div id="projectsContainer" class="flex-1 w-full overflow-y-auto pr-4 lg:pr-8 flex flex-col gap-6 pb-12">
            <div id="loadingState" class="flex flex-col items-center justify-center h-64 text-cyan-600 font-orbitron text-xl animate-pulse">
                SİSTEME BAĞLANILIYOR...
            </div>
        </div>

    </main>

    <script>
    (function KuleRadarOperations() {
        "use strict";

        const i18n = {
            tr: {
                subtitle: "OPERASYON TERMİNALİ",
                pageTitle: "TÜM PROJELER",
                live: "CANLI",
                lblTotal: "Kayıt",
                active: "AKTİF",
                risk: "RİSKTE",
                fieldOps: "⚡ SAHA OPRS.",
                ends: "Deadline",
                unknown: "Bilinmiyor",
                noTeam: "Atanmadı"
            },
            en: {
                subtitle: "OPERATIONS TERMINAL",
                pageTitle: "ALL PROJECTS",
                live: "LIVE",
                lblTotal: "Records",
                active: "ACTIVE",
                risk: "AT RISK",
                fieldOps: "⚡ FIELD OPS",
                ends: "Deadline",
                unknown: "Unknown",
                noTeam: "Unassigned"
            }
        };

        let currentLang = 'tr';
        const API = "/api/data";
        const POLL_INTERVAL = 30000;
        let dataCache = null;

        // JS Filtre/Arama State
        let currentFilter = 'all';
        let searchQuery = '';

        const $container = document.getElementById("projectsContainer");
        const $clock = document.getElementById("clock");
        const $cDate = document.getElementById("cDate");
        const $liveText = document.getElementById("liveText");
        const $headerSubtitle = document.getElementById("headerSubtitle");
        const $pageTitle = document.getElementById("pageTitle");
        const $totalProjCount = document.getElementById("totalProjCount");
        const $lblTotal = document.getElementById("lblTotal");
        const $langToggleBtn = document.getElementById("langToggleBtn");
        
        const $searchInput = document.getElementById("searchInput");
        const $filterBtns = document.querySelectorAll(".filter-btn");

        const MN_TR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
        const DN_TR = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
        const MN_EN = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
        const DN_EN = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];

        function tick() {
            const n = new Date();
            $clock.textContent = n.toLocaleTimeString(currentLang==="tr"?"tr-TR":"en-US", {hour12:false});
            const M = currentLang === "tr" ? MN_TR : MN_EN;
            const D = currentLang === "tr" ? DN_TR : DN_EN;
            $cDate.textContent = `${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()} // ${D[n.getDay()]}`;
        }
        tick(); setInterval(tick, 1000);

        $langToggleBtn.addEventListener("click", () => {
            currentLang = currentLang === "tr" ? "en" : "tr";
            updateStaticTexts();
            filterAndRenderProjects();
        });

        // Arama Input Event
        $searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase();
            filterAndRenderProjects();
        });

        // Filtre Butonları Event
        $filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                $filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                filterAndRenderProjects();
            });
        });

        function updateStaticTexts() {
            const t = i18n[currentLang];
            $headerSubtitle.textContent = t.subtitle;
            $pageTitle.textContent = t.pageTitle;
            $liveText.textContent = t.live;
            $lblTotal.textContent = t.lblTotal;
            document.documentElement.lang = currentLang;
            tick();
        }

        async function pollData() {
            try {
                const r = await fetch(API, { cache: "no-store" });
                if (!r.ok) throw new Error(r.status);
                const newData = await r.json();
                
                if (JSON.stringify(newData) !== JSON.stringify(dataCache)) {
                    dataCache = newData;
                    filterAndRenderProjects();
                }
            } catch(e) { 
                console.warn("[KR-Ops]", e.message); 
            }
        }
        pollData(); setInterval(pollData, POLL_INTERVAL);

        function fmtDate(dateStr) {
            if(!dateStr) return null;
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return null;
            const M = currentLang === "tr" ? MN_TR : MN_EN;
            return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
        }

        function esc(s) { 
            if(!s) return ""; 
            const d=document.createElement("div"); d.textContent=String(s); return d.innerHTML; 
        }

        // Ana Render ve Filtreleme Fonksiyonu
        function filterAndRenderProjects() {
            if (!dataCache) return;
            
            let projects = dataCache.active_projects || [];
            const t = i18n[currentLang];

            // 1. Text Search Filter
            if (searchQuery.trim() !== '') {
                projects = projects.filter(p => {
                    const pName = (typeof p.name === 'object' && p.name !== null) ? (p.name[currentLang] || p.name.tr || t.unknown) : (p.name || t.unknown);
                    const searchStr = `${p.id} ${pName}`.toLowerCase();
                    return searchStr.includes(searchQuery);
                });
            }

            // 2. Category Filter
            if (currentFilter !== 'all') {
                projects = projects.filter(p => {
                    const isRisk = p.status === "at_risk";
                    const isInst = p.is_in_installation || false;
                    
                    if (currentFilter === 'field') return isInst;
                    if (currentFilter === 'risk') return isRisk && !isInst;
                    if (currentFilter === 'active') return !isRisk && !isInst;
                    return true;
                });
            }

            $totalProjCount.textContent = projects.length;

            if (projects.length === 0) {
                $container.innerHTML = `<div class="w-full text-center py-20 font-orbitron text-slate-500 text-xl tracking-widest">[ KAYIT BULUNAMADI ]</div>`;
                return;
            }

            let htmlArr = [];
            
            projects.forEach(p => {
                const isRisk = p.status === "at_risk";
                const isInst = p.is_in_installation || false;
                const pct = isInst ? 100 : (p.progress || 0); 

                const pName = (typeof p.name === 'object' && p.name !== null) ? (p.name[currentLang] || p.name.tr || t.unknown) : (p.name || t.unknown);
                
                let barColor = "bg-cyan-500";
                let glowClass = "shadow-[0_0_12px_rgba(0,255,255,0.6)]";
                let pctColor = "text-cyan-400";
                let statusBadge = `<div class="px-3 py-1 bg-cyan-500/20 text-cyan-300 text-xs font-bold rounded-full whitespace-nowrap">${t.active}</div>`;
                
                if (isInst) {
                    barColor = "bg-amber-400";
                    glowClass = "shadow-[0_0_10px_rgba(251,191,36,0.6)] pulse-warn";
                    pctColor = "text-amber-400";
                    statusBadge = `<div class="px-3 py-1 bg-amber-400/20 text-amber-400 text-xs font-bold rounded-full whitespace-nowrap pulse-warn">${t.fieldOps}</div>`;
                } else if (isRisk) { 
                    barColor = "bg-red-500"; 
                    glowClass = "shadow-[0_0_12px_rgba(255,34,68,0.6)] pulse-warn";
                    pctColor = "text-red-400"; 
                    statusBadge = `<div class="px-3 py-1 bg-red-500/20 text-red-400 text-xs font-bold rounded-full whitespace-nowrap">${t.risk}</div>`;
                } else if (pct >= 100) { 
                    barColor = "bg-green-500"; 
                    glowClass = "shadow-[0_0_10px_rgba(34,197,94,0.6)]";
                    pctColor = "text-green-400"; 
                }

                const teamArr = isInst ? (p.installation_team || []) : (p.team || p.team_ids || []);
                const MAX_AVATARS = 5;
                let avatarHtml = "";
                
                teamArr.slice(0, MAX_AVATARS).forEach(member => {
                    const imgUrl = member.avatar_url || member.photo_url || "/static/avatars/default1.svg";
                    avatarHtml += `<img src="${esc(imgUrl)}" title="${esc(member.name || '')}" class="w-10 h-10 rounded-full object-cover bg-slate-700">`;
                });

                if(teamArr.length > MAX_AVATARS) {
                    avatarHtml += `<div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-mono text-xs text-white">+${teamArr.length - MAX_AVATARS}</div>`;
                }

                const formattedDeadline = fmtDate(p.deadline);
                const deadlineHtml = formattedDeadline 
                    ? `<div class="font-mono text-sm text-slate-400 opacity-80 mt-1">${t.ends}: <span class="text-slate-300 font-bold">${formattedDeadline}</span></div>` 
                    : ``;

                // ADIM 3: group class'ı eklendi (Hover State tetiği için)
                htmlArr.push(`
                <div class="prj-card group flex flex-col md:flex-row bg-slate-900/50 rounded-xl p-6 items-start md:items-center w-full relative">
                    
                    <div class="flex flex-col w-full md:w-[35%] shrink-0 gap-1 pr-4">
                        <span class="font-mono text-sm text-slate-500 tracking-widest">${esc(p.id)}</span>
                        <h3 class="font-rajdhani text-2xl lg:text-3xl font-bold text-white truncate w-full" title="${esc(pName)}">${esc(pName)}</h3>
                        ${deadlineHtml}
                    </div>
                    
                    <div class="flex w-full md:w-[45%] shrink-0 items-center gap-4 mt-4 md:mt-0 pr-4 lg:pr-8">
                        <div class="flex-1 h-4 lg:h-5 bg-slate-800 rounded-full overflow-hidden">
                            <div class="h-full ${barColor} ${glowClass} transition-all duration-1000 ease-out relative" style="width: ${pct}%"></div>
                        </div>
                        <div class="font-orbitron font-bold text-xl lg:text-2xl ${pctColor} w-16 text-right shrink-0">
                            %${pct}
                        </div>
                    </div>
                    
                    <div class="flex w-full md:w-[20%] shrink-0 items-center justify-between md:justify-end gap-4 mt-4 md:mt-0 pr-2 relative">
                        
                        <!-- ADIM 3: Kart İçi Hızlı Aksiyon (YÖNET Butonu) -->
                        <button class="opacity-0 group-hover:opacity-100 transition-all duration-300 bg-slate-950 hover:bg-cyan-500 text-cyan-400 hover:text-slate-900 px-4 py-1.5 rounded-lg text-xs font-bold font-mono shadow-[0_0_8px_rgba(0,255,255,0.2)] hover:shadow-[0_0_15px_rgba(0,255,255,0.6)] absolute -left-20 lg:-left-24 z-20 cursor-pointer hidden md:block">
                            ⚙️ YÖNET
                        </button>
                        
                        ${statusBadge}
                        <div class="flex flex-row -space-x-3 shrink-0">
                            ${avatarHtml || `<span class="text-xs text-slate-500 font-mono italic">${t.noTeam}</span>`}
                        </div>
                    </div>

                </div>
                `);
            });

            $container.innerHTML = htmlArr.join("");
        }

        updateStaticTexts();

    })();
    </script>
</body>
</html>
